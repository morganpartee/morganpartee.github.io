title: John Partee — Writing
author: John Partee
email: john@jpartee.com
description: >-
  Archived writing by John Partee. Originally published on sensibledefaults.io
  between 2021 and 2023 — a mix of Python, data science, AI/LLM, and cloud
  engineering notes. Reposted here with original publish dates preserved.

# Use the minima theme — GitHub Pages builds this with zero setup.
theme: minima
minima:
  skin: auto
  date_format: "%B %-d, %Y"
  social_links:
    - { platform: github,   user_url: "https://github.com/morganpartee" }
    - { platform: linkedin, user_url: "https://www.linkedin.com/in/johnpartee" }

# Pretty permalinks without the category prefix.
permalink: /:year/:month/:day/:title/

# Plugins allowed by GitHub Pages out-of-the-box.
plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap

# Show newest first on the home page.
show_excerpts: true

# Exclude build/dev files from the generated site.
exclude:
  - Gemfile
  - Gemfile.lock
  - vendor
  - README.md
  - .jekyll-cache
